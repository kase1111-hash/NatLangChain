version: "3.8"

services:
  # =============================================================================
  # NatLangChain API Server
  # =============================================================================
  natlangchain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: natlangchain-api
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CHAIN_DATA_FILE=/app/data/chain_data.json
      - NATLANGCHAIN_ENCRYPTION_KEY=${NATLANGCHAIN_ENCRYPTION_KEY:-}
      - NATLANGCHAIN_ENCRYPTION_ENABLED=${NATLANGCHAIN_ENCRYPTION_ENABLED:-true}
      - NATLANGCHAIN_API_KEY=${NATLANGCHAIN_API_KEY:-}
      - NATLANGCHAIN_REQUIRE_AUTH=${NATLANGCHAIN_REQUIRE_AUTH:-true}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - natlangchain-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =============================================================================
  # Development Server (with hot reload)
  #
  # SECURITY: The dev profile intentionally binds to loopback only
  # (127.0.0.1) to avoid exposing the development server on the host
  # network. FLASK_DEBUG is disabled by default because Werkzeug's
  # interactive debugger allows remote code execution. Authentication
  # is required by default; provide NATLANGCHAIN_API_KEY via .env for
  # local testing. Do NOT combine FLASK_DEBUG=true with
  # NATLANGCHAIN_REQUIRE_AUTH=false — run_server.py will refuse to
  # start in that configuration.
  # =============================================================================
  natlangchain-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: natlangchain-dev
    ports:
      - "127.0.0.1:${PORT:-5000}:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CHAIN_DATA_FILE=/app/data/chain_data.json
      - NATLANGCHAIN_API_KEY=${NATLANGCHAIN_API_KEY:-}
      - NATLANGCHAIN_REQUIRE_AUTH=${NATLANGCHAIN_REQUIRE_AUTH:-true}
    volumes:
      - ./src:/app/src:ro
      - natlangchain-dev-data:/app/data
    profiles:
      - dev

volumes:
  natlangchain-data:
    driver: local
  natlangchain-dev-data:
    driver: local
